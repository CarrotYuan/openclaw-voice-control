app:
  name: openclaw-voice-control
  platform: macos
  log_dir: logs
  runtime_dir: runtime

openclaw:
  base_url: ${OPENCLAW_BASE_URL}
  agent_id: ${OPENCLAW_AGENT_ID}
  model: ${OPENCLAW_MODEL}
  user: ${OPENCLAW_USER}
  timeout_seconds: 120

audio:
  sample_rate: 16000
  channels: 1
  input_device_index: -1
  silence_threshold: 0.008
  silence_seconds_end: 1.2
  max_record_seconds: 60
  min_speech_seconds: 0.4
  start_timeout_seconds: 3.0
  start_hits_required: 3
  start_hit_threshold: 0.008
  max_pending_blocks: 10

wakeword:
  provider: porcupine
  keyword_path: assets/wakeword/hey-jarvis_en_mac_v4_0_0.ppn
  cooldown_seconds: 1.5

tts:
  engine: macos_say
  voice: Yue
  wake_ack: 我在
  followup_beep_enabled: true
  followup_beep_sound: /System/Library/Sounds/Glass.aiff
  record_done_beep_enabled: true
  record_done_sound: /System/Library/Sounds/Funk.aiff
  no_speech_beep_enabled: true
  no_speech_sound: /System/Library/Sounds/Pop.aiff
  post_reply_delay: 0.05

overlay:
  enabled: true
  state_file: runtime/overlay_state.json
  stop_flag_file: runtime/stop_tts.flag
  poll_interval_ms: 150

asr:
  provider: funasr
  model: iic/SenseVoiceSmall
  vad_model: fsmn-vad
  model_path: models/SenseVoiceSmall
  vad_model_path: models/fsmn-vad
  language: zh
  device: cpu
  disable_update: true
  disable_pbar: true
